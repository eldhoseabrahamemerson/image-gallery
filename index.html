<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Image Gallery</h1>

    <p class="subtitle">
        Click a thumbnail below to preview the image.
    </p>

    <div class="gallery">

        <!--large image-->
        <div class="preview">

            <button id="prevBtn" class="nav-btn">&#10094;</button>

            <img id="mainImage" src="images/image1.jpg" alt="Gallery Image">

            <button id="nextBtn" class="nav-btn">&#10095;</button>

        </div>

        <!--thumbnails-->
    </div class="thumbnails">
    <img src="images/image1.jpg" alt="Thumbnail 1" class="thumb" loading="lazy">
    <img src="images/image2.jpg" alt="Thumbnail 2" class="thumb" loading="lazy">
    <img src="images/image3.jpg" alt="Thumbnail 3" class="thumb" loading="lazy">
    <img src="images/image4.jpg" alt="Thumbnail 4" class="thumb" loading="lazy">
    <img src="images/image5.jpg" alt="Thumbnail 5" class="thumb" loading="lazy">
    <img src="images/image6.jpg" alt="Thumbnail 6" class="thumb" loading="lazy">
    <img src="images/image7.jpg" alt="Thumbnail 7" class="thumb" loading="lazy">
    <img src="images/image8.jpg" alt="Thumbnail 8" class="thumb" loading="lazy">
    </div>

    </div>

    <footer>
        <p>Created by Eldhose Abraham Emerson</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
